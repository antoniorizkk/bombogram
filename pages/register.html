<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../styles/styles.css">
        <link rel="stylesheet" href="../styles/styles.footer.css">
        <link rel="stylesheet" href="../styles/styles.anchor.css">
        <link rel="stylesheet" href="../styles/styles.register.css">
        <title>Bombogram</title>
    </head>
    <body>
        <div class="container">
            <div class="greetings">
                <div class="title">
                    <h1>Bombogram</h1>
                </div>
                <div class="bio-greetings">
                    <p>share your life with your friends</p>
                </div>

            </div>
            <hr class="barrier">
            <div>
                <div class="action-title">
                    <h2>Register, come on in!</h2>
                </div>
                <div class="form-container">
                    <form action="">
                        <div class="label-name-container">
                            <div class="form-labels">
                                <label for="firstname">First Name</label>
                            </div>
                            <div class="form-labels">
                                <label for="lastname" id="lastname-label">Last Name</label>
                            </div> 
                        </div>

                        <div class="input-name-container">
                            <div class="form-input">
                                <input type="text" id="firstname" placeholder="John" required>
                            </div>

                            <div class="form-input">
                                <input type="text" id="lastname" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="form-labels">
                            <label for="username">Username</label>
                        </div> 
                        <div class="form-input">
                            <input type="text" id="username" placeholder="john.doe or johndoe1234 etc..." required>
                        </div>  
                        <div class="form-labels">
                            <label for="email">Email</label>
                        </div> 
                        <div class="form-input">
                            <input type="email" id="email" placeholder="john@xyz.com" required>
                        </div>    
                        
                        <div class="form-labels">
                            <label for="password">Password</label>
                        </div>
                        <div class="form-input">
                            <input type="password" id="password" placeholder="enter your password..." required>
                        </div>

                        <div class="register-button">

                            <div class="form-button">
                                <input type="submit" value="Register">
                            </div>
                        </div>

                        <br>
                        <div class="">
                            <div class="form-anchor">
                                <a href="../index.html">Aready joined? Login</a>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>

            <footer>
                <div class="footer-container">
                    <div class="copyright">
                        <p>&copy;2026 Bombogram | Designed and Coded By Antonio Rizk</p>
                    </div>
                    <div class="footer-urls">
                        <hr>
                        <ul>
                            <li><div class="form-anchor"><a href="./pages/aboutus.html">About us</a></div></li>
                            <li><div class="form-anchor"><a href="./pages/contactus.html">Contact us</a></div></li>
                            <li><div class="form-anchor"><a href="./pages/privacyPolicies.html">Privacy Policies</a></div></li>
                        </ul>
                    </div>

                </div>

            </footer>
    </body>
</html>
