<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/footer/styles.footer.css">
        <link rel="stylesheet" href="./styles/anchor/styles.anchor.css">
        <link rel="stylesheet" href="./styles/label/styles.label.css">
        <link rel="stylesheet" href="./styles/button/styles.button.css">
        <link rel="stylesheet" href="./styles/input/styles.input.css" />
        <link rel="stylesheet" href="./styles/styles.css">
        <title>Bombogram</title>
    </head>
    <body>
        <div class="container">
            <div class="greetings">
                <div class="title">
                    <h1>Bombogram</h1>
                </div>
                <div class="bio-greetings">
                    <p>share your life with your friends</p>
                </div>

            </div>
            <hr class="barrier">
            <div>
                <div class="action-title">
                    <h2>Login, you've been missed!</h2>
                </div>
                <div class="form-container">
                    <form action="">
                        <div class="grp-label-inputs"></div>
                        <div class="label-input-container">
                            <div class="label">
                                <label for="email">Email</label>
                            </div> 
                            <div class="input">
                                <input type="email" id="email" placeholder="john@xyz.com" required>
                            </div>   
                        </div>
 
                        <div class="label-input-container">
                            <div class="label">
                                <label for="password">Password</label>
                            </div>
                            <div class="input">
                                <input type="password" id="password" placeholder="enter your password..." required>
                            </div>
                        </div>
                            <div class="button">
                                <input type="submit" value="Login">
                            </div>
                        <div class="useful-links">
                            <div class="form-anchor">
                                <a href="pages/forget-password.html">forget password</a>
                            </div>
                            <div class="form-anchor">
                                <a href="pages/register.html">New here? Register</a>
                            </div>
                        </div>

                    </form>
                </div>

            </div>
        </div>

            <footer>
                <div class="footer-container">
                    <div class="copyright">
                        <p>&copy;2026 Bombogram | Designed and Coded By Antonio Rizk</p>
                    </div>
                    <div class="footer-urls">
                        <hr>
                        <ul>
                            <li><div class="form-anchor"><a href="#">About us</a></div></li>
                            <li><div class="form-anchor"><a href="#">Contact us</a></div></li>
                            <li><div class="form-anchor"><a href="#">Privacy Policies</a></div></li>
                        </ul>
                    </div>

                </div>

            </footer>
    </body>
</html>
