<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/styles.css">
        <title>Bombogram</title>
    </head>
    <body>
        <div class="container">
            <div class="greetings">
                <div class="title">
                    <h1>Bombogram</h1>
                </div>
                <div class="bio-greetings">
                    <p>share your life with your friends</p>
                </div>

            </div>
            <hr class="barrier">
            <div>
                <div class="action-title">
                    <h2>Login, you've been missed!</h2>
                </div>
                <div class="form-container">
                    <form action="">
                    <div class="form-labels">
                        <label for="email">Email</label>
                    </div> 
                    <div class="form-input">
                        <input type="email" id="email" placeholder="john@xyz.com" required>
                    </div>    
                    
                    <div class="form-labels">
                        <label for="password">Password</label>
                    </div>
                    <div class="form-input">
                        <input type="password" id="password" placeholder="enter your password..." required>
                    </div>

                    <div class="login-utils">
                        <div class="form-anker">
                            <a href="pages/forgot-password.html">forget password</a>
                        </div>
                        <div class="form-button">
                            <input type="submit" value="Login">
                        </div>
                    </div>

                    <br>
                    <div class="go-to-register">
                        <div class="form-anker">
                            <a href="pages/register.html">New here? Register</a>
                        </div>
                    </div>

                </form>
                </div>

            </div>
        </div>

            <footer>
                <div class="footer-container">
                    <div class="copyright">
                        <p>&copy;2026 Bombogram | Designed and Coded By Antonio Rizk</p>
                    </div>
                    <div class="footer-urls">
                        <hr>
                        <ul>
                            <li><div class="form-anker"><a href="./pages/aboutus.html">About us</a></div></li>
                            <li><div class="form-anker"><a href="./pages/contactus.html">Contact us</a></div></li>
                            <li><div class="form-anker"><a href="./pages/privacyPolicies.html">Privacy Policies</a></div></li>
                        </ul>
                    </div>

                </div>

            </footer>
    </body>
</html>
